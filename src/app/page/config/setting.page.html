<section class="flex-col gap-6">
	<div class="flex-col gap-2">
		<h4>Appearance</h4>

		<form [formGroup]="form" class="flex-col gap-1">
			<input appThemed type="radio" label="System" value="system" formControlName="appearance" />
			<input appThemed type="radio" label="Light" value="light" formControlName="appearance" />
			<input appThemed type="radio" label="Dark" value="dark" formControlName="appearance" />
		</form>
	</div>

	<div class="flex-col gap-2">
		<h4>Backup</h4>

		<div class="flex-col gap-4">
			<div class="flex-row gap-4">
				<button appThemed type="button" (click)="downloadBackup()" class="flex-grow">
					Download backup
				</button>

				<button appThemed type="button" (click)="restoreInput.click()" class="flex-grow">
					Restore backup
				</button>

				<input
					#restoreInput
					hidden
					type="file"
					accept="application/json"
					(change)="restoreBackup($event)"
				/>
			</div>

			<button appThemed color="accent" appRouterLink="/settings/backup-conflict">
				Go to Backup conflict
			</button>
		</div>

		@if (restoreError(); as error) {
			<p class="fs-sm">{{ error }}</p>
		}

		@if (restoreSummaryRows().length > 0) {
			<ul class="flex-col gap-1 fs-sm">
				@for (row of restoreSummaryRows(); track row.label) {
					<li>
						{{ row.label }}: {{ row.counters.added }} added, {{ row.counters.skipped }} skipped
					</li>
				}
			</ul>
		}
	</div>

	<p class="flex-row flex-grow justify-center align-end mono fs-sm">version {{ VERSION }}</p>
</section>
